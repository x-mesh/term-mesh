# term-mesh overrides for GhosttyKit.
#
# Disable Ghostty's built-in shell integration.  term-mesh handles shell
# integration via its own ZDOTDIR injection (.zshenv) which already loads
# ghostty-integration manually.  Leaving Ghostty's integration enabled
# causes its .zshenv always-block to clear functions defined by term-mesh
# (autoload scope cleanup), breaking report_pwd and sidebar directory updates.
shell-integration = none
