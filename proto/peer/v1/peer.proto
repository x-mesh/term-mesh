// term-mesh peer federation protocol, v1.
//
// Wire format: length-prefixed Protobuf.
// See docs/peer-federation-protocol.md for the authoritative spec;
// this file is the canonical schema that both Swift (client/host GUI)
// and Rust (daemon) code consume.
//
// Schema evolution rules:
//   1. Never reuse a field number. Removing a field: mark it reserved.
//   2. New fields must be optional; missing-on-wire must decode to defaults.
//   3. New messages that a peer may lack support for must be gated
//      behind a capability string declared in Hello.capabilities.
//   4. Incompatible changes bump the major in Hello.protocol_version.

syntax = "proto3";

package termmesh.peer.v1;

// ============================================================
// Envelope
// ============================================================

// Every frame on the wire is a length-prefixed Envelope.
// Frames larger than 16 MiB must be rejected with ERR_FRAME_TOO_LARGE.
message Envelope {
  // Monotonic per sender, starts at 1.
  uint64 seq = 1;
  // Echoes a request's seq on replies, 0 otherwise.
  uint64 correlation_id = 2;

  oneof payload {
    Hello hello = 10;
    AuthChallenge auth_challenge = 11;
    Auth auth = 12;
    AuthResult auth_result = 13;

    ListSurfaces list_surfaces = 20;
    SurfaceList surface_list = 21;
    AttachSurface attach_surface = 22;
    AttachResult attach_result = 23;
    DetachSurface detach_surface = 24;

    PtyData pty_data = 30;
    Input input = 31;
    Resize resize = 32;
    GridSnapshot grid_snapshot = 33;
    DataAck data_ack = 34;

    WorkspaceUpdate workspace_update = 40;

    Ping ping = 50;
    Pong pong = 51;

    Goodbye goodbye = 60;

    Error error = 99;
  }
}

// ============================================================
// Handshake
// ============================================================

message Hello {
  // semver, e.g. "1.0.0". Majors must match; minor drift is allowed.
  string protocol_version = 1;
  // Stable 128-bit UUID of this install. Used for per-client authorization.
  bytes peer_id = 2;
  // User-facing name shown in sidebars: "MacBook Pro", "mac-mini.local", etc.
  string display_name = 3;
  // Feature flags a peer advertises: e.g. "grid-snapshot-v1".
  repeated string capabilities = 4;
  // term-mesh marketing version; diagnostics only.
  string app_version = 5;
}

message AuthChallenge {
  // 32 random bytes generated by the host.
  bytes nonce = 1;
  // Method identifiers the host will accept, in order of preference.
  repeated string supported_methods = 2;
}

message Auth {
  // Must be one of AuthChallenge.supported_methods.
  // MVP methods: "ssh-passthrough" (no signature), "token-ed25519".
  string method = 1;
  // Identifier for the key used (empty for ssh-passthrough).
  bytes token_id = 2;
  // Method-specific payload (ed25519(nonce) for token-ed25519).
  bytes signature = 3;
}

message AuthResult {
  bool accepted = 1;
  // Human-readable reason on failure; empty on success.
  string reason = 2;
  // Host-assigned session identifier; echoed for correlation, informational.
  bytes session_id = 3;
}

// ============================================================
// Surface discovery & attach
// ============================================================

message ListSurfaces {}

message SurfaceList {
  repeated SurfaceInfo surfaces = 1;
}

message SurfaceInfo {
  bytes surface_id = 1;
  string workspace_name = 2;
  string title = 3;
  uint32 cols = 4;
  uint32 rows = 5;
  // "terminal" or "browser"; more types may be added later.
  string surface_type = 6;
  // Host policy may forbid per-surface attach.
  bool attachable = 7;
  // Captured at spawn time, i.e. the directory the child was chdir'd into
  // before exec. Does NOT track runtime cd; for that, subscribe to
  // WorkspaceUpdate.meta events (future).
  string cwd = 8;
  // Git branch of `cwd` resolved at spawn time, or empty if not a git repo.
  string branch = 9;
}

enum AttachMode {
  ATTACH_MODE_UNSPECIFIED = 0;
  ATTACH_MODE_READ_ONLY = 1;
  ATTACH_MODE_CO_WRITE = 2;
  ATTACH_MODE_TAKE_OVER = 3;
}

message AttachSurface {
  bytes surface_id = 1;
  AttachMode mode = 2;
  uint32 client_cols = 3;
  uint32 client_rows = 4;
  // If present, the client is resuming a prior attach; host should replay
  // buffered PtyData starting at this byte_seq, or fall back to GridSnapshot.
  uint64 resume_from_seq = 5;
}

message AttachResult {
  bool accepted = 1;
  string reason = 2;
  bytes surface_id = 3;
  // byte_seq at which the upcoming PtyData stream begins.
  uint64 initial_seq = 4;
  // May differ from the requested mode if the host downgraded (e.g. co-write
  // requested but host granted read-only due to policy).
  AttachMode granted_mode = 5;
}

message DetachSurface {
  bytes surface_id = 1;
}

// ============================================================
// Terminal data plane
// ============================================================

message PtyData {
  bytes surface_id = 1;
  // Cumulative byte offset since this attach session began.
  uint64 byte_seq = 2;
  bytes payload = 3;
}

message Input {
  bytes surface_id = 1;
  oneof kind {
    // Raw key bytes already encoded in the terminal's expected form.
    bytes keys = 10;
    MouseEvent mouse = 11;
    Paste paste = 12;
  }
}

message MouseEvent {
  uint32 col = 1;
  uint32 row = 2;
  // 0=move, 1=left, 2=middle, 3=right, 4=wheel-up, 5=wheel-down.
  uint32 button = 3;
  // Bitfield: 1=shift, 2=ctrl, 4=alt, 8=cmd.
  uint32 modifiers = 4;
  bool pressed = 5;
}

message Paste {
  bytes text = 1;
}

message Resize {
  bytes surface_id = 1;
  uint32 cols = 2;
  uint32 rows = 3;
  uint32 pixel_width = 4;
  uint32 pixel_height = 5;
}

// Periodic visible-screen keyframe. Scrollback is NOT included here;
// clients reconnecting within the host ring buffer get bytes replayed,
// clients outside accept scrollback loss.
message GridSnapshot {
  bytes surface_id = 1;
  // byte_seq this snapshot is consistent with.
  uint64 byte_seq = 2;
  uint32 cols = 3;
  uint32 rows = 4;
  bool alt_screen = 5;
  CursorState cursor = 6;
  repeated GridRow rows_data = 7;
}

message CursorState {
  uint32 col = 1;
  uint32 row = 2;
  bool visible = 3;
  // libghostty cursor style enum; mirrors GhosttyKit's value.
  uint32 style = 4;
}

message GridRow {
  repeated Cell cells = 1;
}

message Cell {
  // Usually a single grapheme; wide chars occupy one Cell plus a continuation.
  string text = 1;
  uint32 fg_rgba = 2;
  uint32 bg_rgba = 3;
  // Bitfield: bold, italic, underline, strike, inverse, dim.
  uint32 attrs = 4;
  bool is_continuation = 5;
}

// Advisory: clients may send periodically for RTT measurement and so the
// host can trim its reconnect ring buffer. Not required for correctness.
message DataAck {
  bytes surface_id = 1;
  uint64 ack_seq = 2;
}

// ============================================================
// Workspace structural events
// ============================================================

message WorkspaceUpdate {
  oneof kind {
    SurfaceAdded added = 1;
    SurfaceRemoved removed = 2;
    SurfaceRetitled retitled = 3;
    WorkspaceMeta meta = 4;
    SplitChanged split = 5;
  }
}

message SurfaceAdded {
  SurfaceInfo surface = 1;
  bytes pane_id = 2;
}

message SurfaceRemoved {
  bytes surface_id = 1;
}

message SurfaceRetitled {
  bytes surface_id = 1;
  string title = 2;
}

message WorkspaceMeta {
  string branch = 1;
  string cwd = 2;
  repeated uint32 ports = 3;
  string latest_notification = 4;
}

message SplitChanged {
  bytes pane_id = 1;
  // Opaque tree snapshot; sidebar decoder will be versioned separately.
  // Placeholder until the split-tree schema is frozen.
  bytes snapshot = 2;
}

// ============================================================
// Keepalive & shutdown
// ============================================================

message Ping {
  uint64 nonce = 1;
}

message Pong {
  uint64 nonce = 1;
}

message Goodbye {
  string reason = 1;
}

// ============================================================
// Error
// ============================================================

message Error {
  // See docs/peer-federation-protocol.md §Error Codes for the taxonomy.
  // Codes < 500 are surface-fatal; >= 500 are connection-fatal.
  uint32 code = 1;
  string message = 2;
  // Raw 16 bytes if the error pertains to a specific prior message.
  bytes correlation_id_bytes = 3;
}
